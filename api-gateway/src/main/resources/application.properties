spring.config.import=optional:file:.env[.properties]
spring.application.name=ApiGateway
server.port=${PORT}

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}

# Spring Cloud Gateway Routing Configuration
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Microservices Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.routes[2].id=video-service
spring.cloud.gateway.routes[2].uri=lb://VIDEO-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/videos/**

spring.cloud.gateway.routes[3].id=upload-service
spring.cloud.gateway.routes[3].uri=lb://UPLOAD-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/upload/**

spring.cloud.gateway.routes[4].id=streaming-service
spring.cloud.gateway.routes[4].uri=lb://STREAMING-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/stream/**

spring.cloud.gateway.routes[5].id=analytics-service
spring.cloud.gateway.routes[5].uri=lb://ANALYTICS-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/analytics/**

# CORS Configuration for Frontend Integration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4201,http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
