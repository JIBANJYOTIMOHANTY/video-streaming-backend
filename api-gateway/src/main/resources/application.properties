spring.config.import=optional:file:.env[.properties]
spring.application.name=ApiGateway
server.port=${PORT}

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}

# NOTE: API proxy routes and CORS are defined in GatewayConfig.java (Java DSL)
# NOTE: Swagger doc proxying is handled by SwaggerProxyController.java

# Swagger/OpenAPI Aggregator Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/auth-service
springdoc.swagger-ui.urls[1].name=User Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/user-service
springdoc.swagger-ui.urls[2].name=Video Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/video-service
springdoc.swagger-ui.urls[3].name=Upload Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/upload-service
springdoc.swagger-ui.urls[4].name=Streaming Service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/streaming-service
springdoc.swagger-ui.urls[5].name=Analytics Service
springdoc.swagger-ui.urls[5].url=/v3/api-docs/analytics-service

# Custom logging date-time pattern
logging.pattern.dateformat=yyyy-MM-dd HH:mm:ss.SSS

# Multipart File Upload Limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-swallow-size=-1
